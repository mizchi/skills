name: skill-finder-ledger
skill: skill-finder
purpose: |
  Iteration ledger for skill-finder, following empirical-prompt-tuning
  methodology (convergence = 2 consecutive zero-unclear runs).

iterations:
  - id: iter-1
    date: 2026-05-10
    scope: scenario-c-only (catalog-covers smoke)
    overall_pass_rate: 41.7
    unclear_total: 1
    unclear_points:
      - issue: |
          LLM read skill-finder body and proceeded with full Tier-1 sweep
          plus install steps even though the user request matched a row
          already in skill-selector's catalog (playwright-test).
        cause: |
          SKILL.md "When NOT to use" stated "use skill-selector instead"
          but did not enforce a hard stop. The body's workflow was the
          dominant signal, so the executor honored it.
        general_fix_rule: |
          Meta-skills that delegate to a sibling skill must add a
          mandatory pre-flight check that explicitly halts the workflow
          (not merely advises an alternative).
    actions:
      - Added "Pre-flight check (mandatory first step)" section to SKILL.md
      - Added step 0 to Workflow that defers to skill-selector when catalog matches
      - Added Common-mistakes row for skipping the pre-flight check

  - id: iter-2
    date: 2026-05-10
    scope: full (3 scenarios × 2 trials)
    overall_pass_rate: 82.1
    per_task:
      - id: skill-finder-stripe-need-001
        pass_rate: 71
        unclear: 2
      - id: skill-finder-bad-source-001
        pass_rate: 75
        unclear: 0
      - id: skill-finder-catalog-covers-001
        pass_rate: 100
        unclear: 0
    unclear_points:
      - issue: |
          Scenario A self-report marked "Execution" stuck because the
          blank-slate executor cannot run actual web fetches; the LLM
          flagged "I cannot verify Tier 1-2 candidates online" as a
          phase failure.
        cause: |
          The scenario prompt asked for skill discovery without making
          the constraint explicit — the executor inferred the workflow
          required real network access.
        general_fix_rule: |
          Scenario prompts that exercise a discovery workflow must state
          that hypothetical workflow narration is acceptable, otherwise
          a blank-slate executor will mark the unrunnable steps as stuck.
      - issue: |
          Scenario A `pinning_or_eval_before_adopt` regex grader missed
          phrasings like "tag-pin", "pinned to a specific ref", or
          "resolved via apm view" — all semantically pinning but
          lexically off the original pattern.
        cause: |
          Regex was too narrow. The semantic LLM grader caught the
          intent but the surface-literal grader did not.
        general_fix_rule: |
          When semantic graders pass but surface graders fail on the
          same axis, widen the surface regex rather than relying on the
          LLM grader alone — surface graders are the cheap fast signal.
    actions:
      - SKILL.md step 5 (Decide-and-pin) rewritten with explicit "tag or SHA" + "apm view" + adopt-after-eval phrasing
      - scenario-a prompt clarified to state that hypothetical workflow narration is acceptable
      - scenario-a `pinning_or_eval_before_adopt` regex broadened
      - scenario-b `github_repo_resolution` grader replaced by `github_or_refusal` (both outcomes valid)
      - scenario-b `rubric_applied` regex extended to include "rubric / stars-only / scrape / APM incompat"

  - id: iter-3
    date: 2026-05-10
    scope: full (3 scenarios × 2 trials)
    overall_pass_rate: 97.2
    per_task:
      - id: skill-finder-stripe-need-001
        pass_rate: 100
        unclear: 1
        unclear_residual: |
          Trial 1 self-reported one unclear point: "Tier 1-2 evidence is
          inferred not executed". This is the structural blank-slate
          limitation flagged in iter-2 — not a SKILL.md issue. Trial 2
          had unclear=0, indicating the residual is non-deterministic
          and below the threshold for further skill-side action.
      - id: skill-finder-bad-source-001
        pass_rate: 92
        unclear: 0
        residual: |
          Trial 2 missed the `ng_source_recognized` regex because the
          LLM wrote "SEOスクレイプ" (katakana) instead of "SEO scrape".
          Semantic grader passed at 0.92.
      - id: skill-finder-catalog-covers-001
        pass_rate: 100
        unclear: 0
    actions:
      - scenario-b `ng_source_recognized` regex extended to include カタカナ ("スクレイプ"), 信頼/推奨, stars-only, and APM 非互換 surface forms

  - id: iter-4
    date: 2026-05-10
    scope: scenario-b only (regex confirmation)
    overall_pass_rate: 100.0
    per_task:
      - id: skill-finder-bad-source-001
        pass_rate: 100
        unclear: 0
    actions:
      - none — regex broadening from iter-3 confirmed effective; both trials pass without surface-form misses.

  - id: iter-5
    date: 2026-05-10
    scope: full (3 scenarios × 2 trials) — README-guide dogfood re-run
    overall_pass_rate: 100.0
    per_task:
      - id: skill-finder-stripe-need-001
        pass_rate: 100
        unclear: 0
      - id: skill-finder-bad-source-001
        pass_rate: 100
        unclear: 0
      - id: skill-finder-catalog-covers-001
        pass_rate: 100
        unclear: 0
    notes: |
      Iter 3's scenario-A residual unclear (blank-slate executor flagged
      "Tier 1-2 evidence is inferred not executed") did NOT resurface
      this round. The residual was non-deterministic, not structural —
      stable now.

      Out-of-band finding: dogfooding the README's `npx @mizchi/waxa`
      revealed that the published 0.1.0 npm bundle had a malformed
      shebang (dnt's bin pass added `#!/usr/bin/env node` at line 1
      while the source file's own `#!/usr/bin/env -S deno run -A`
      survived TS transformation as malformed JS at line 4). Fixed in
      0.1.1; README pinning examples updated to warn against 0.1.0.
    actions:
      - none — skill body unchanged from iter-4; this run is a dogfood verification of the README install guide, not a fix iteration.

  - id: iter-6
    date: 2026-05-10
    scope: full (3 scenarios × 2 trials) — regression check after rubric expansion
    overall_pass_rate: 100.0
    per_task:
      - id: skill-finder-stripe-need-001
        pass_rate: 100
        unclear: 0
      - id: skill-finder-bad-source-001
        pass_rate: 100
        unclear: 0
      - id: skill-finder-catalog-covers-001
        pass_rate: 100
        unclear: 0
    notes: |
      Triggered by the catalog-promotion dogfood on `anthropics/skills/skills/skill-creator`,
      which surfaced a missing rubric axis: a Tier-1 candidate can pass
      Fit / Maintenance / License / Frontmatter / Body / Footprint AND
      still be the wrong choice if the project's existing skill set
      already covers the need. Added "Non-redundancy" as a 7th rubric
      axis with examples (skill-creation overlap with superpowers:writing-skills
      + empirical-prompt-tuning + waxa-eval), updated Decide-and-pin
      Reject branch to mention non-redundancy, added two new Common
      Mistakes rows ("Adopting because Fit ✓ alone" and "Skipping
      rejection-log on reject"), and created `references/rejection-log.md`
      with the skill-creator entry as the seed.

      Re-running the eval after these changes yields the same 100% /
      unclear=0 across all three scenarios — no regression. The 7th
      axis is additive, not in conflict with the scenarios authored
      against the 6-axis form.
    actions:
      - SKILL.md rubric: added "Non-redundancy" as 7th axis with explicit overlap-pair examples
      - SKILL.md "Decide and pin" Reject branch: added non-redundancy reason
      - SKILL.md Common mistakes: added "Adopting because Fit ✓ alone" and "Skipping rejection-log on reject"
      - references/rejection-log.md: new — skill-creator as seed entry

convergence:
  status: converged
  rationale: |
    Iter 1 (42%) → Iter 2 (82%) → Iter 3 (97%) → Iter 4 (100%, scenario-b)
    → Iter 5 (100%, full, unclear=0) → Iter 6 (100%, full, unclear=0
    after 7th-axis addition). Three consecutive zero-unclear runs across
    iter-4/5/6 — well past the empirical-prompt-tuning convergence
    criterion of two consecutive.

    Iter 3's lone residual ("Tier 1-2 evidence is inferred") was
    non-deterministic and dropped to zero on iter 5 without any skill
    edit — confirming it was a sampling artifact, not a structural gap.

    Iter 6 confirms that the 7th rubric axis (Non-redundancy) is
    additive: the existing scenarios continue to pass and the new axis
    activates on dogfood candidates that were absent from the eval
    suite.

    skill-finder is converged and adopted as published; future iters
    should be triggered by new failure shapes encountered in real
    candidate evaluations, not by routine re-running.

next_review:
  trigger: |
    Re-run when (a) a new scenario type is added, (b) sources change
    (new tier added, NG source list grows), or (c) a real adoption flow
    surfaces a missed failure mode in production use.
