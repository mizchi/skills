id: nix-setup-flake-overlay-001
name: Pure flake for a Rust project that needs rust-overlay + buildNpmPackage
description: |
  Edge case — the project needs rust-overlay (custom input) for a pinned
  stable Rust toolchain, plus buildNpmPackage to wrap an internal CLI.
  The Decision matrix says: pick pure flake.nix.

tags:
  - flake
  - rust
  - overlay
  - decision-matrix

inputs:
  prompt: |
    新規 Rust プロジェクトを立ち上げる:
    - Rust stable channel を pin したい (rust-overlay 経由)
    - cargo-nextest と cargo-watch を環境に含める
    - リポジトリに含まれる Node.js 製の internal CLI を
      `buildNpmPackage` で Nix derivation に wrap して、
      `nix run .#my-cli` で呼べるようにしたい
      (CLI のソースは `tools/cli/`、`package.json` の `bin` に
      `my-cli` が登録されている前提)
    - flake.lock を authoritative reproducibility source として team
      で共有したい
    - direnv 利用可

    "再現可能な dev 環境をセットアップしてほしい。何をどこに置けば動く?"

expected:
  output_contains:
    - "flake.nix"
  require_self_report: true

graders:
  - name: chose_flake
    type: text
    config:
      regex_match:
        - "(?i)flake\\.nix"

  - name: overlay_or_custom_derivation_acknowledged
    type: text
    config:
      # The reasoning for picking flake should mention at least one of:
      # rust-overlay, overlay, custom derivation, buildNpmPackage,
      # flake.lock as authoritative.
      regex_match:
        - "(?i)rust-overlay|overlay|buildNpmPackage|flake\\.lock"

  - name: assets_template_referenced
    type: text
    config:
      # The skill ships an assets/rust template; a good answer points at
      # it (cp assets/rust/{flake.nix,.envrc} . or similar).
      regex_match:
        - "(?i)assets/rust|rust/flake\\.nix|cp\\s+.*flake\\.nix"

  - name: direnv_use_flake
    type: text
    config:
      regex_match:
        - "(?i)use\\s+flake|\\.envrc"

  - name: self_report_complete
    type: self-report
    config:
      require_present: true
      require_all_phases_ok: true
      max_unclear: 0
      max_retries: 2

  - name: decision_path_semantic
    type: llm
    config:
      rubric: |
        deliverable は次をすべて満たしているか?
        1. nix-setup の "Decision matrix" を踏まえて **pure flake.nix** を選ぶ判断を明示している
           (rust-overlay / buildNpmPackage / flake.lock authoritative のいずれかを根拠に)
        2. `assets/rust/{flake.nix,.envrc}` の `cp` を提案、または rust-overlay を
           input に持つ flake.nix の最小スケルトンを具体的に提示
        3. `buildNpmPackage` の use を言及 (詳細実装の skeleton か、nix-setup の
           "Handling npm tools with Nix" を参照する形でよい)
        4. direnv `.envrc` で `use flake` を含めるべきと明示
        5. devbox を選ばない (devbox では rust-overlay / buildNpmPackage の
           表現が不自然になる) ことに直接または間接的に触れている
        6. flake.lock を commit する点に触れている
        全 6 項を満たすときのみ PASS: yes。1 つでも欠けたら PASS: no。
