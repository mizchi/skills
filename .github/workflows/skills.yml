name: skills

on:
  push:
    paths:
      - ".github/workflows/skills.yml"
      - "**/SKILL.md"
      - "**/SKILL-ja.md"
      - "**/README.md"
      - "**/evals/**"
      - "scripts/**"
      - "Taskfile.pkl"
  pull_request:
    paths:
      - ".github/workflows/skills.yml"
      - "**/SKILL.md"
      - "**/SKILL-ja.md"
      - "**/README.md"
      - "**/evals/**"
      - "scripts/**"
      - "Taskfile.pkl"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Show Ruby version
        run: ruby --version
      - name: Test frontmatter validator
        run: ruby scripts/validate-skill-frontmatter_test.rb
      - name: Validate SKILL.md frontmatter
        run: ruby scripts/validate-skill-frontmatter.rb
      - name: Check generated README files
        run: ruby scripts/gen-skill-readme.rb --check
