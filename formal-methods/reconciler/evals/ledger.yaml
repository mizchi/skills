eval: formal-methods-reconciler-eval
skill: formal-methods-reconciler
patterns:
  - rule: >-
      Keep domain uncertainty separate from executor uncertainty. Domain-owner
      questions such as empty allowlist semantics or spec/code disagreement
      belong in the deliverable ledger, not in self-report unclear points.
    seen_in:
      - 2
      - 3
      - 4
    representative_issue: >-
      Config and async scenarios initially counted intentional domain/runtime
      gaps as unclear even when the requested deliverable was a plan.
  - rule: >-
      Surface graders for formal-methods outputs must allow equivalent domain
      wording, property IDs, and English/Japanese variants; semantic LLM graders
      decide whether the real contract is satisfied.
    seen_in:
      - 1
      - 3
      - 4
    representative_issue: >-
      Regex-only checks missed valid outputs such as "Domain questions",
      "20–29", "P1 (cross-org)", and "SMT -> CI" ordering.
  - rule: >-
      For plan-only tasks without a runnable repo/toolchain, label traces or
      SAT/UNSAT expectations as planned/hand-derived and provide exact commands
      for CI; do not pretend the verifier was run.
    seen_in:
      - 4
      - 6
    representative_issue: >-
      Async idempotency output correctly planned a TLA+ check, but one trial
      treated the absence of a TLC run as executor uncertainty.
