eval: formal-methods-drift-guard-eval
skill: formal-methods-drift-guard
patterns:
  - rule: >-
      When multiple surfaces changed, choose one primary drift class by asking
      which surface currently diverges from the accepted domain rule. Record
      spec/code changes that caused the situation as drivers or secondary
      notes, not as additional primary classes.
    seen_in:
      - 1
    representative_issue: >-
      Authz docs and code both accepted the Support read-only Settings
      exception while the model still encoded the old admin-only rule, causing
      the executor to hesitate between spec-drift and model-drift.
  - rule: >-
      When a domain rule becomes more granular than the existing model, record
      the abstraction choice as a domain/model question in the ledger rather
      than as executor uncertainty.
    seen_in:
      - 4
    representative_issue: >-
      Support read-only Settings introduced read/write action granularity while
      the old model only had `Reachable(Settings)`, leading the executor to
      flag whether to split states or add a capability relation as unclear.
  - rule: >-
      If a verifier or model check is explicitly not run and the requested
      deliverable is a drift ledger, record `not-run` as epistemic status and
      propose the check as a lock update instead of marking self-report unclear.
    seen_in:
      - 7
    representative_issue: >-
      Config code-drift output correctly separated log-confirmed and not-run
      evidence, but still reported the unrun model check as unclear.
